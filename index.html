<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Apuestas - Kingball</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #1e293b;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Indicador de Estado de Conexión */
        .estado-conexion {
            position: fixed;
            top: 15px;
            left: 15px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ef4444; /* Rojo por defecto */
            box-shadow: 0 0 8px #ef4444;
            z-index: 9999;
            transition: all 0.4s ease;
        }

        .estado-conexion.conectado {
            background: #22c55e; /* Verde */
            box-shadow: 0 0 8px #22c55e;
        }

        /* Estilos del Login */
        .login-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-container h2 {
            color: #0f172a;
            margin-bottom: 10px;
        }

        .login-container p {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #334155;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        .input-group input:focus {
            border-color: #2563eb;
        }

        .btn-ingresar {
            width: 100%;
            background: #2563eb;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-ingresar:hover {
            background: #1d4ed8;
        }

        /* Panel Principal (Oculto al inicio) */
        .panel-listero {
            display: none;
            width: 100%;
            max-width: 1000px;
            background: #0f172a;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .barra-superior {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .nombre-lista {
            font-size: 20px;
            font-weight: bold;
            color: #38bdf8;
        }

        .btn-cerrar {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .zona-entrada-apuestas {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            background: #1e293b;
            padding: 15px;
            border-radius: 8px;
            align-items: flex-end;
        }

        .recuadro-apuesta {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .recuadro-apuesta label {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 6px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .recuadro-apuesta input {
            padding: 10px;
            font-size: 16px;
            border-radius: 6px;
            border: 1px solid #475569;
            background: #0f172a;
            color: #ffffff;
        }

        .btn-anotar {
            background: #10b981;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            height: 44px;
        }

        .pantallas-captacion {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .pantalla-bloque {
            background: #1e293b;
            border-radius: 8px;
            padding: 15px;
            min-height: 200px;
        }

        .pantalla-bloque h4 {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 10px;
            text-transform: uppercase;
            border-bottom: 1px solid #334155;
            padding-bottom: 5px;
        }

        .contenido-pantalla {
            font-family: monospace;
            font-size: 16px;
            color: #4ade80;
            white-space: pre-line;
            max-height: 250px;
            overflow-y: auto;
        }

        .zona-inferior {
            display: flex;
            justify-content: flex-end;
        }

        .tabla-totales {
            background: #1e293b;
            border-radius: 8px;
            padding: 15px;
            width: 300px;
        }

        .fila-total {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .fila-total.principal {
            border-top: 1px solid #475569;
            margin-top: 12px;
            padding-top: 8px;
            font-weight: bold;
            font-size: 16px;
            color: #38bdf8;
        }
    </style>
</head>
<body>

    <div class="estado-conexion" id="indicadorConexion"></div>

    <div class="login-container" id="seccionLogin">
        <h2>Kingball Clientes</h2>
        <p>Introduce tus credenciales de acceso</p>
        
        <form id="loginForm" onsubmit="entrarAlSistema(event)">
            <div class="input-group">
                <label for="usuario">Usuario listero</label>
                <input type="text" id="usuario" placeholder="Ej: juan_99" required autocomplete="username">
            </div>
            
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn-ingresar">Validar Entrada</button>
        </form>
    </div>

    <div class="panel-listero" id="seccionListero">
        <div class="barra-superior">
            <div class="nombre-lista" id="txtNombreLista">Lista: Activa</div>
            <button class="btn-cerrar" onclick="cerrarSesion()">Salir del Sistema</button>
        </div>

        <div class="zona-entrada-apuestas">
            <div class="recuadro-apuesta">
                <label for="campoNumero">Número(s)</label>
                <input type="text" id="campoNumero" placeholder="00 ó 00 00">
            </div>
            <div class="recuadro-apuesta">
                <label for="campoPrecio">Precio de Apuesta</label>
                <input type="text" id="campoPrecio" placeholder="0 ó 0,0" onkeypress="evaluarEnter(event)">
            </div>
            <button class="btn-anotar" onclick="procesarJugada()">Anotar</button>
        </div>

        <div class="area-principal-trabajo">
            <div class="pantallas-captacion">
                <div class="pantalla-bloque">
                    <h4>Fijos y Corridos</h4>
                    <div class="contenido-pantalla" id="pantallaFC"></div>
                </div>
                <div class="pantalla-bloque">
                    <h4>Parles</h4>
                    <div class="contenido-pantalla" id="pantallaParles"></div>
                </div>
                <div class="pantalla-bloque">
                    <h4>Centenas</h4>
                    <div class="contenido-pantalla" id="pantallaCentenas"></div>
                </div>
            </div>

            <div class="zona-inferior">
                <div class="tabla-totales">
                    <div class="fila-total">
                        <span>Fijos/Corridos:</span>
                        <span id="totalFC">$0.00</span>
                    </div>
                    <div class="fila-total">
                        <span>Parles:</span>
                        <span id="totalP">$0.00</span>
                    </div>
                    <div class="fila-total">
                        <span>Centenas:</span>
                        <span id="totalC">$0.00</span>
                    </div>
                    <div class="fila-total principal">
                        <span>TOTAL BRUTO:</span>
                        <span id="totalGeneral">$0.00</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuración de Supabase incorporada directamente
        const SUPABASE_URL = 'https://xdqkyxrzniybczmiyxrs.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_PtpvXsWZ71hXw7uQJCrhUA_RYvqCS2t';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        var usuarioActivo = "";
        var listaActivaId = "";

        // Función para verificar el estado de la conexión en vivo
        function verificarConexionNube() {
            var ind = document.getElementById('indicadorConexion');
            supabaseClient.from('perfiles').select('count', { count: 'exact', head: true })
            .then(function(res) {
                if(res.error) {
                    ind.classList.remove('conectado');
                } else {
                    ind.classList.add('conectado');
                }
            })
            .catch(function() {
                ind.classList.remove('conectado');
            });
        }

        // Ejecutar revisión cada 4 segundos
        setInterval(verificarConexionNube, 4000);
        verificarConexionNube();

        // Control de Entrada Estricto mediante Base de Datos Remota
        function entrarAlSistema(event) {
            event.preventDefault();
            
            var userField = document.getElementById('usuario').value.trim().toLowerCase();
            var passField = document.getElementById('password').value.trim();

            if(!userField || !passField) return;

            supabaseClient
                .from('perfiles')
                .select('*')
                .eq('usuario', userField)
                .eq('password', passField)
                .then(function(respuesta) {
                    if (respuesta.error) {
                        alert("Error de comunicación de red: " + respuesta.error.message);
                        return;
                    }
                    
                    if (respuesta.data && respuesta.data.length > 0) {
                        var filaUsuario = respuesta.data[0];
                        usuarioActivo = filaUsuario.usuario;
                        listaActivaId = filaUsuario.lista_id;

                        document.getElementById('txtNombreLista').innerText = "Lista: " + usuarioActivo.toUpperCase();
                        document.getElementById('seccionLogin').style.display = 'none';
                        document.getElementById('seccionListero').style.display = 'block';
                    } else {
                        alert("Acceso Denegado: Usuario o contraseña incorrectos.");
                    }
                })
                .catch(function(err) {
                    alert("Imposible validar en este momento: " + err.message);
                });
        }

        function evaluarEnter(e) {
            if (e.key === 'Enter') {
                procesarJugada();
            }
        }

        function procesarJugada() {
            var inputNum = document.getElementById('campoNumero');
            var inputPrecio = document.getElementById('campoPrecio');

            var strNum = inputNum.value.trim();
            var strPrecio = inputPrecio.value.trim();

            if (!strNum || !strPrecio) return;

            var arrayBloques = strNum.split(' ');
            var unionDigitos = arrayBloques.join('');

            // Estructuración condicional según tipo de jugada
            if (unionDigitos.length === 3) {
                var p = parseFloat(strPrecio) || 0;
                inyectarYEnviar('centenas', unionDigitos, p, strNum + " (" + p + ")");
            } 
            else if (arrayBloques.length === 1) {
                var nFijo = arrayBloques[0];
                if (nFijo.length !== 2) return;

                var pFijo = 0, pCorrido = 0;
                if (strPrecio.includes(',')) {
                    var partes = strPrecio.split(',');
                    pFijo = parseFloat(partes[0]) || 0;
                    pCorrido = parseFloat(partes[1]) || 0;
                } else {
                    pFijo = parseFloat(strPrecio) || 0;
                }
                inyectarYEnviar('fc', nFijo, (pFijo + pCorrido), nFijo + " (" + pFijo + ") (" + pCorrido + ")");
            } 
            else if (arrayBloques.length >= 2) {
                var pBase = parseFloat(strPrecio) || 0;
                var combinaciones = (arrayBloques.length * (arrayBloques.length - 1)) / 2;
                var totalBrutoParle = combinaciones * pBase;
                inyectarYEnviar('parles', arrayBloques.sort().join(' '), totalBrutoParle, arrayBloques.join(' ') + " (" + pBase + ")");
            }

            inputNum.value = "";
            inputPrecio.value = "";
            inputNum.focus();
        }

        function inyectarYEnviar(tipoId, numeroTarget, montoBruto, textoImpreso) {
            var destinoId = tipoId === 'fc' ? 'pantallaFC' : (tipoId === 'parles' ? 'pantallaParles' : 'pantallaCentenas');
            document.getElementById(destinoId).innerText += textoImpreso + "\n";

            actualizarContadoresGlobales(tipoId, montoBruto);

            // Inserción directa de fila estructurada en Supabase
            supabaseClient.from('apuestas').insert({
                lista_id: listaActivaId,
                usuario: usuarioActivo,
                tipo: tipoId,
                numero: numeroTarget,
                precio: montoBruto,
                importe_bruto: montoBruto,
                importe_limpio: montoBruto,
                metadata: { texto: textoImpreso }
            }).then(function(res) {
                if (res.error) console.log("Error al subir jugada: " + res.error.message);
            });
        }

        function actualizarContadoresGlobales(tipo, valor) {
            var targetSpanId = tipo === 'fc' ? 'totalFC' : (tipo === 'parles' ? 'totalP' : 'totalC');
            var elemento = document.getElementById(targetSpanId);
            var actual = parseFloat(elemento.innerText.replace('$', '')) || 0;
            elemento.innerText = "$" + (actual + valor).toFixed(2);

            var fc = parseFloat(document.getElementById('totalFC').innerText.replace('$', '')) || 0;
            var p = parseFloat(document.getElementById('totalP').innerText.replace('$', '')) || 0;
            var c = parseFloat(document.getElementById('totalC').innerText.replace('$', '')) || 0;
            
            document.getElementById('totalGeneral').innerText = "$" + (fc + p + c).toFixed(2);
        }

        function cerrarSesion() {
            usuarioActivo = "";
            listaActivaId = "";
            document.getElementById('loginForm').reset();
            document.getElementById('pantallaFC').innerText = "";
            document.getElementById('pantallaParles').innerText = "";
            document.getElementById('pantallaCentenas').innerText = "";
            document.getElementById('totalFC').innerText = "$0.00";
            document.getElementById('totalP').innerText = "$0.00";
            document.getElementById('totalC').innerText = "$0.00";
            document.getElementById('totalGeneral').innerText = "$0.00";
            document.getElementById('seccionListero').style.display = 'none';
            document.getElementById('seccionLogin').style.display = 'block';
        }
    </script>
</body>
</html>
